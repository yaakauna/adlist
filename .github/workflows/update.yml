name: Update MosDNS ad list

on:
  schedule:
    - cron: "23 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh list
        run: ./update.sh
      - name: Commit changes
        run: |
          if git diff --quiet -- adblockmosdns.txt; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add adblockmosdns.txt
          git commit -m "chore: update MosDNS ad list"
          git push
