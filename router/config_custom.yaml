log:
  level: warn
  file: "/tmp/mosdns.log"

api:
  http: "127.0.0.1:9091"

include: []

plugins:
  - tag: ad_domains
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/adblockmosdns.txt"

  - tag: ad_allowlist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/adblock-allowlist.txt"

  - tag: lazy_cache
    type: cache
    args:
      size: 10000
      lazy_cache_ttl: 3600

  - tag: forward_local
    type: forward
    args:
      concurrent: 2
      upstreams:
        - addr: "223.5.5.5"
        - addr: "119.29.29.29"

  - tag: main_sequence
    type: sequence
    args:
      - matches:
          - qname $ad_domains
          - "!qname $ad_allowlist"
        exec: reject 3
      - exec: $lazy_cache
      - matches: has_resp
        exec: accept
      - exec: $forward_local

  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: "127.0.0.1:5335"

  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: "127.0.0.1:5335"
